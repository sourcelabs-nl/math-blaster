name: Deploy to GitHub Pages

# Build the WebAssembly distribution and publish it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; newer pushes cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build the WebAssembly distribution
        run: ./gradlew wasmJsBrowserDistribution --no-daemon

      - name: Upload the site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/dist/wasmJs/productionExecutable

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
